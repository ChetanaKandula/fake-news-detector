<!DOCTYPE html>
<html>
<head>
  <title>Fake News Detector</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 35px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 420px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin-bottom: 20px;
      color: #333;
      font-size: 26px;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      resize: none;
      margin-bottom: 18px;
      font-size: 14px;
      outline: none;
      transition: 0.3s;
    }

    textarea:focus {
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102,126,234,0.5);
    }

    button {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    #result {
      margin-top: 25px;
      font-size: 22px;
      font-weight: bold;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>📰 Fake News Detector</h1>
    <p style="color:#555; font-size:14px;">
  Detect whether news content is real or fake using AI
</p>

    <textarea id="newsText" rows="5" placeholder="Paste news content here..."></textarea>

    <button onclick="checkNews()">Analyze</button>

    <h2 id="result"></h2>

    <div class="footer">
      Powered by Chetana Kandula.
    </div>
  </div>

  <script>
    async function checkNews() {
      const text = document.getElementById("newsText").value;
      const resultElement = document.getElementById("result");

      if (!text.trim()) {
        resultElement.innerText = "⚠️ Please enter some text";
        resultElement.style.color = "orange";
        return;
      }

      resultElement.innerText = "⏳ Analyzing...";
      resultElement.style.color = "#333";

      try {
        const response = await fetch("http://localhost:3000/predict", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text })
        });

        const data = await response.json();

        if (data.prediction === "Fake News") {
          resultElement.style.color = "red";
          resultElement.innerText = "❌ Fake News Detected";
        } else {
          resultElement.style.color = "green";
          resultElement.innerText = "✅ Real News";
        }

      } catch (error) {
        resultElement.innerText = "❌ Error connecting to server";
        resultElement.style.color = "red";
      }
    }
  </script>

</body>
</html>
